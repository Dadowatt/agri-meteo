<div
  class="risk-card"
  [style.border-left]="'6px solid ' + risque.couleur">

  <div class="d-flex justify-content-between align-items-center">

    <div>

      <h6 class="mb-1">
        Indice de risque
      </h6>

      <small>
        {{ risque.libelle }}
      </small>

    </div>

    <div class="risk-score">

      {{ risque.score }}%

    </div>

  </div>

</div>
